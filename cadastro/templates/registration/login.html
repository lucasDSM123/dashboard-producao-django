{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dashboard de Produção</title>
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 25px;
            color: #1a1d23;
            font-size: 24px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Essencial para o padding não quebrar o layout */
        }
        .btn-login {
            background: #007bff;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: #0056b3;
        }
        .error-msg {
            color: #dc3545;
            font-size: 14px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Acesso ao Sistema</h2>
        
        {% if form.errors %}
            <p class="error-msg">Usuário ou senha incorretos!</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" name="username" required placeholder="Digite seu usuário">
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="password" required placeholder="Digite sua senha">
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <p style="margin-top: 20px; font-size: 12px; color: #aaa;">
            Gestão de Produção & Materiais
        </p>
    </div>
</body>
</html>
